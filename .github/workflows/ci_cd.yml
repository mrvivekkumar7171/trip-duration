name: CI Pipeline

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Lint code
        run: echo "Linting repository"

      - name: Run unit tests
        run: echo "Running unit tests"

  build-and-push-ecr-image:
    name: Push to Artifact Registry (GCP)
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        id: login-ecr
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker --quiet ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Download model from GCS
        run: |
          gcloud storage cp gs://trip-duration-dvc-storages/models/model.joblib ./model.joblib

      - name: Build, tag, and push image to Artifact Registry
        id: build-image
        env:
          IMAGE_NAME: trip-duration
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPO_NAME: ${{ secrets.GCP_AR_REPO_NAME }}
        run: |
          IMAGE_URI=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:latest
          
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "::set-output name=image::$IMAGE_URI"

  Continuous-Deployment:
    runs-on: self-hosted
    needs: build-and-push-ecr-image
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
      
      - name: Pull latest images
        env:
          IMAGE_NAME: trip-duration
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPO_NAME: ${{ secrets.GCP_AR_REPO_NAME }}
        run: |
          IMAGE_URI=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:latest
          docker pull $IMAGE_URI
      
      - name: Delete Previous Container
        run: |
          docker rm -f trip-duration || true

      - name: Run Docker Image to serve users
        env:
            IMAGE_NAME: trip-duration
            PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
            REGION: ${{ secrets.GCP_REGION }}
            REPO_NAME: ${{ secrets.GCP_AR_REPO_NAME }}
        run: |
            IMAGE_URI=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:latest
            docker run -d -p 8080:8080 --ipc="host" --name=trip-duration $IMAGE_URI